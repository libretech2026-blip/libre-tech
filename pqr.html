<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LIBRE TECH - Peticiones, Quejas, Reclamos y Sugerencias">
  <meta name="theme-color" content="#1a4b8c">
  <title>PQRs | LIBRE TECH</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="icon" type="image/png" href="LOGO_LIBRETECH.png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ==================== HEADER ==================== -->
  <header class="site-header" id="siteHeader">
    <div class="header-inner">
      <a href="index.html" class="logo-link">
        <img src="LOGO_LIBRETECH.png" alt="LIBRE TECH" class="logo-img" style="height:40px">
      </a>
      <div style="flex:1"></div>
      <div class="header-actions">
        <button class="theme-toggle" id="themeToggle" title="Cambiar modo" aria-label="Cambiar tema">
          <svg id="themeIconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg id="themeIconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
        </button>
        <a href="index.html" class="btn btn-outline" style="font-size:0.8rem;padding:6px 14px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Volver a la tienda
        </a>
      </div>
    </div>
  </header>

  <!-- ==================== MAIN ==================== -->
  <main style="padding-top:80px;min-height:100vh;">
    <div class="pqr-section" id="pqrSection">
      <!-- Will show login prompt if not logged in, form if logged in -->
    </div>
  </main>

  <!-- ==================== FOOTER ==================== -->
  <footer class="site-footer" style="margin-top:var(--spacing-xxl);">
    <div class="footer-inner">
      <p style="text-align:center;font-size:0.8rem;color:var(--text-tertiary);">
        &copy; 2025 LIBRE TECH &mdash; Todos los derechos reservados
      </p>
    </div>
  </footer>

  <!-- Dark mode toggle script (same as other pages) -->
  <script>
    (function(){
      const saved = localStorage.getItem('libretech_theme');
      if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme:dark)').matches)) {
        document.documentElement.setAttribute('data-theme','dark');
      }
      document.addEventListener('DOMContentLoaded', () => {
        const toggle = document.getElementById('themeToggle');
        const sun = document.getElementById('themeIconSun');
        const moon = document.getElementById('themeIconMoon');
        function applyIcons() {
          const dark = document.documentElement.getAttribute('data-theme') === 'dark';
          if (sun) sun.style.display = dark ? 'none' : 'block';
          if (moon) moon.style.display = dark ? 'block' : 'none';
        }
        applyIcons();
        if (toggle) toggle.addEventListener('click', () => {
          const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
          document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
          localStorage.setItem('libretech_theme', isDark ? 'light' : 'dark');
          applyIcons();
        });
      });
    })();
  </script>

  <!-- App scripts -->
  <script src="js/supabase-client.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      try { await SB.syncProducts(); } catch (e) { console.warn('SB sync:', e); }
      Auth.init();

      const section = document.getElementById('pqrSection');
      if (!section) return;

      // Wait a bit for auth to resolve
      setTimeout(async () => {
        const user = (typeof Auth !== 'undefined' && Auth.getUser) ? Auth.getUser() : null;

        if (!user) {
          section.innerHTML = `
            <h2>Peticiones, Quejas, Reclamos y Sugerencias</h2>
            <p style="color:var(--text-secondary);margin-bottom:var(--spacing-md);">Debes iniciar sesión para enviar una PQR.</p>
            <a href="index.html" class="btn btn-primary" style="display:inline-block;">Ir a iniciar sesión</a>
          `;
          return;
        }

        let html = `<h2>Peticiones, Quejas, Reclamos y Sugerencias</h2>`;
        html += `<p style="color:var(--text-secondary);margin-bottom:var(--spacing-lg);font-size:0.9rem;">
          Registrado como <strong>${escapeHTML(user.email)}</strong>
        </p>`;

        // Form
        html += `
          <form id="pqrForm">
            <div class="pqr-field">
              <label for="pqrType">Tipo de solicitud</label>
              <select id="pqrType" required>
                <option value="">-- Selecciona --</option>
                <option value="peticion">Petición</option>
                <option value="queja">Queja</option>
                <option value="reclamo">Reclamo</option>
                <option value="sugerencia">Sugerencia</option>
              </select>
            </div>
            <div class="pqr-field">
              <label for="pqrSubject">Asunto</label>
              <input type="text" id="pqrSubject" placeholder="Resumen breve de tu solicitud" required maxlength="150">
            </div>
            <div class="pqr-field">
              <label for="pqrMessage">Mensaje</label>
              <textarea id="pqrMessage" placeholder="Describe tu solicitud con detalle..." required maxlength="2000"></textarea>
            </div>
            <button type="submit" class="btn btn-primary" id="btnSubmitPqr" style="width:100%;padding:12px;">Enviar PQR</button>
          </form>
        `;

        // History placeholder
        html += `<div class="pqr-history" id="pqrHistory"><h3>Mis solicitudes anteriores</h3><p style="color:var(--text-tertiary);font-size:0.85rem;">Cargando...</p></div>`;

        section.innerHTML = html;

        // Bind form submit
        document.getElementById('pqrForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          const type = document.getElementById('pqrType').value;
          const subject = document.getElementById('pqrSubject').value.trim();
          const message = document.getElementById('pqrMessage').value.trim();
          if (!type || !subject || !message) return;

          const btn = document.getElementById('btnSubmitPqr');
          btn.disabled = true;
          btn.textContent = 'Enviando...';

          try {
            await SB.submitPqr({
              userId: user.id,
              userEmail: user.email,
              type, subject, message
            });
            Cart.showToast('PQR enviada correctamente', 'success');
            document.getElementById('pqrForm').reset();
            loadHistory(user.id);
          } catch (err) {
            Cart.showToast('Error: ' + err.message, 'error');
          } finally {
            btn.disabled = false;
            btn.textContent = 'Enviar PQR';
          }
        });

        // Load history
        loadHistory(user.id);
      }, 600);

      async function loadHistory(userId) {
        const container = document.getElementById('pqrHistory');
        if (!container) return;
        try {
          const pqrs = await SB.getUserPqrs(userId);
          if (!pqrs || pqrs.length === 0) {
            container.innerHTML = '<h3>Mis solicitudes anteriores</h3><p style="color:var(--text-tertiary);font-size:0.85rem;">No tienes solicitudes aún.</p>';
            return;
          }
          let html = `<h3>Mis solicitudes anteriores (${pqrs.length})</h3>`;
          pqrs.forEach(pqr => {
            const typeLabel = { peticion: 'Petición', queja: 'Queja', reclamo: 'Reclamo', sugerencia: 'Sugerencia' }[pqr.type] || pqr.type;
            const date = pqr.created_at ? new Date(pqr.created_at).toLocaleDateString('es-CO') : '';
            const answered = pqr.status === 'answered';
            html += `<div class="pqr-card ${answered ? 'answered' : ''}">
              <div class="pqr-card-header">
                <strong>${escapeHTML(typeLabel)}: ${escapeHTML(pqr.subject)}</strong>
                <span class="pqr-status-badge ${answered ? 'answered' : 'open'}">${answered ? 'Respondida' : 'Abierta'}</span>
              </div>
              <p style="font-size:0.85rem;color:var(--text-secondary);margin:4px 0;">${escapeHTML(pqr.message)}</p>
              <small style="color:var(--text-tertiary)">${date}</small>
              ${pqr.admin_reply ? `<div class="pqr-reply-box"><strong>Respuesta:</strong> ${escapeHTML(pqr.admin_reply)}</div>` : ''}
            </div>`;
          });
          container.innerHTML = html;
        } catch (err) {
          container.innerHTML = '<h3>Mis solicitudes anteriores</h3><p style="color:var(--danger);font-size:0.85rem;">Error al cargar solicitudes.</p>';
        }
      }

      function escapeHTML(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }
    });
  </script>
</body>
</html>
